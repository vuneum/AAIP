version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: aaip-db
    environment:
      POSTGRES_USER: aaip
      POSTGRES_PASSWORD: aaip_secret
      POSTGRES_DB: aaip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aaip"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aaip-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aaip-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://aaip:aaip_secret@db:5432/aaip
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      AAIP_DEV_MODE: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aaip-worker
    command: celery -A tasks.celery_app worker --loglevel=info
    working_dir: /app
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://aaip:aaip_secret@db:5432/aaip
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aaip-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
